## Override Rules

### Who Can Override Which Gate?

| Gate | Blocking | Override Required | Override Approval |
|------|----------|-------------------|-------------------|
| Gate 1: Quality Score (T1) | Yes | Yes | C-level executive |
| Gate 1: Quality Score (T2) | Yes | Yes | Director+ |
| Gate 1: Quality Score (T3) | Yes | Yes | Manager+ |
| Gate 1: Quality Score (T4) | Yes | Yes | Team lead |
| Gate 2: Critical Issues | Yes | No | Never (must fix) |
| Gate 3: Guardrails | Yes | Yes (T1 only) | Executive + reason logged |
| Gate 4: Quality Trend | No | N/A | N/A (warning only) |
| Gate 5: Confidence | No | N/A | N/A (warning only) |

### Override Logging

When override requested:
```
Log entry required:
  - Override reason: "Why bypass this gate?"
  - Approver: "Who approved?"
  - Timestamp: "When was override granted?"
  - Risk: "What's the risk if this fails?"

Example:
  "Override Gate 1 (T2 score 72). Reason: Timeline pressure, messaging can improve post-launch.
   Approver: sarah@company.com. Risk: May need customer comms if positioning doesn't land.
   Logged: 2026-07-21 14:32 UTC"
```

---

## Automated Actions on Gate Failure

### If Quality Score Gate Fails:

```
Suggestion:
  Run meta-review auto-fix recommendations
  - Fix 1: [specific recommendation]
  - Fix 2: [specific recommendation]
  - Estimated time: 30 min
  - Estimated new score: +8 points (72 → 80)
```

### If Critical Issues Gate Fails:

```
Blocking message:
  "Critical gap: {gap_name}. Must be resolved before deployment.

   How to fix:
   1. [Specific action]
   2. [Specific action]

   Or: Downgrade tier to {lower_tier} (score meets {lower_tier} standard)"
```

### If Guardrails Gate Fails:

```
Alert + suggestion:
  "Guardrail triggered: {guardrail_name}
   Why it matters: {guardrail_rationale}

   Suggested fix: {fix_recommendation}
   Or: Request exception from {stakeholder_name}"
```

---

## Success Metrics for CI/CD Gates

Track these metrics to ensure gates are working:

| Metric | Target | What It Means |
|--------|--------|---------------|
| % deployments blocked by gates | 10-15% | Gates are filtering low quality |
| % block rate by gate | Gate 1: 5%, Gate 2: 3%, Gate 3: 5% | Distribution of blocks |
| % override rate (when allowed) | <5% | Overrides are rare, not routine |
| % of blocked outputs that pass after fix | 80%+ | Outputs are fixable, not unsalvageable |
| False positive rate (gates block, output succeeds anyway) | <10% | Gates are accurate predictors |
| False negative rate (gates pass, output fails) | <5% | Gates don't miss failures |

---

## Gate Tuning Over Time

As meta-review collects data, gates can be tuned:

### After 50 Outputs:
- Assess false positive rate (gates too strict?)
- Assess false negative rate (gates too lenient?)
- Adjust thresholds if needed

### After 100 Outputs:
- Analyze which gates are most predictive of actual success
- Consider downweighting low-signal gates
- Consider upweighting high-signal gates

### After 200 Outputs:
- Build machine-learned confidence prediction (vs. current heuristic)
- Personalize thresholds by user (if variability exists)
- Consider skill-specific thresholds (some skills are riskier than others)

---

## Example: Gate Evaluation Walkthrough

**Scenario:** T2 GTM brief, quality score 78/100

```
Gate 1: Quality Score Minimum
  Rule: T2 requires 75+
  Output score: 78
  Check: 78 >= 75? YES ✓
  Result: PASS

Gate 2: Critical Issues
  Rule: Must have zero critical gaps
  Issues found: 0 (no critical gaps)
  Check: 0 == 0? YES ✓
  Result: PASS

Gate 3: Guardrail Compliance
  Active guardrails for T2: champion_alignment, messaging_clarity, metric_rigor

  Champion alignment: ✓ PASS (champion identified + aligned)
  Messaging clarity: ⚠️ HIT (positioning feels incremental, not bold)
  Metric rigor: ✓ PASS (targets have confidence bands)

  Check: All pass? NO ✗ (messaging clarity hit)
  Result: FAIL

OVERALL GATE STATUS: ❌ BLOCKED

Deployment blocked because:
  - Gate 1 PASS
  - Gate 2 PASS
  - Gate 3 FAIL (messaging_clarity guardrail triggered)

Action: Fix messaging (see auto-fix recommendations) or request guardrail exception.

Optional warnings (non-blocking):
  - Gate 4: Quality trend is stable (no decline)
  - Gate 5: Confidence is 72% (above T2 minimum of 60%)
```

