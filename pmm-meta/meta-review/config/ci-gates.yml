# Meta-Review CI/CD Gates Configuration
# Version: 2.0.0
# Description: Automated quality gates for CI/CD pipeline integration

ci_gates:

  # Gate System Overview
  overview:
    purpose: "Block low-quality outputs from deployment; ensure tier standards are met"
    gate_logic: "All gates must PASS; any FAIL blocks deployment"
    review_bypass: "Only executive override (with reason logged)"
    notification: "Notify on failure with specific gate(s) that failed"

  # Gate 1: Quality Score Threshold
  gate_1_quality_score:
    name: "Quality Score Minimum"
    description: "Output must meet minimum quality score for its tier"
    type: "NUMERIC_THRESHOLD"
    blocking: true

    rules:
      T1:
        minimum_score: 90
        message: "T1 requires 90+ quality score. Current: {score}/100"
        override_required: "Executive approval"

      T2:
        minimum_score: 75
        message: "T2 requires 75+ quality score. Current: {score}/100"
        override_required: "Director approval"

      T3:
        minimum_score: 60
        message: "T3 requires 60+ quality score. Current: {score}/100"
        override_required: "Manager approval"

      T4:
        minimum_score: 50
        message: "T4 requires 50+ quality score. Current: {score}/100"
        override_required: "Team lead approval"

    implementation:
      check: "score >= tier_minimum"
      on_fail: "Block deployment, show score gap"
      on_pass: "Gate passes, continue to Gate 2"

  # Gate 2: Critical Issues (Blocking Gaps)
  gate_2_critical_issues:
    name: "No Critical/Blocking Gaps"
    description: "Output must have zero critical issues marked during quality review"
    type: "CATEGORICAL"
    blocking: true

    critical_gap_definitions:
      missing_positioning: "Positioning statement missing or unintelligible"
      missing_success_criteria: "Success metrics completely missing"
      unresolved_major_risk: "Major risk identified with no mitigation plan"
      unrealistic_timeline: "Timeline is clearly infeasible"
      tier_mismatch_high: "Output is 2+ tiers below assigned tier"

    implementation:
      check: "critical_gap_count == 0"
      on_fail: "Block deployment, list all critical gaps"
      on_pass: "Gate passes, continue to Gate 3"
      override: "Not allowed (critical gaps must be fixed, not overridden)"

  # Gate 3: Guardrail Compliance
  gate_3_guardrail_compliance:
    name: "Active Guardrails Pass"
    description: "Output must pass all active guardrails for its tier"
    type: "PATTERN_MATCH"
    blocking: true

    guardrail_activation_by_tier:
      T1:
        - "champion_alignment: Champion must be identified and aligned"
        - "messaging_clarity: Positioning must own unique value angle"
        - "competitive_accuracy: Competitive context must be data-backed"
        - "metric_rigor: Success metrics must include confidence bands"
        - "timeline_feasibility: All dependencies must be mapped"

      T2:
        - "champion_alignment: Champion should be identified"
        - "messaging_clarity: Positioning should own a value angle"
        - "metric_rigor: Targets must be grounded in data"

      T3:
        - "metric_rigor: Targets must be realistic"

      T4: []
      # No guardrails for T4

    implementation:
      check: "for each active_guardrail: guardrail_passes == true"
      on_fail: "Block deployment, list guardrails that failed"
      on_pass: "Gate passes, continue to Gate 4"
      hit_interpretation:
        "HIT": "Guardrail triggered, output fails this gate"
        "PASS": "Guardrail check passed, no issue"

  # Gate 4: Quality Trend Acceptable
  gate_4_quality_trend:
    name: "Quality Trend is Healthy"
    description: "Output quality is not declining compared to recent history"
    type: "TREND_ANALYSIS"
    blocking: false
    # Note: This is non-blocking because trend is informational, not absolute

    trend_rules:
      declining_trend:
        definition: "Output score is 10+ points below user's 30-day average"
        action: "WARN (non-blocking, but alert user)"
        message: "Your recent outputs avg {avg}/100, this is {score}/100 (-{gap} points). Check for quality dip."

      stable_trend:
        definition: "Output score is within ±5 points of user's 30-day average"
        action: "PASS (trend is stable)"
        message: "Quality is stable (consistent with your recent average)"

      improving_trend:
        definition: "Output score is 5+ points above user's 30-day average"
        action: "PASS (trend is improving)"
        message: "Quality is improving! This is +{gap} points above your recent average."

    implementation:
      check: "score >= (avg_score - 10)"
      on_fail: "WARN (non-blocking), show trend comparison"
      on_pass: "Gate passes"
      data_source: "context/quality-trends.md (past 30 days)"

  # Gate 5: Confidence Prediction Acceptable
  gate_5_confidence_prediction:
    name: "Tier Success Confidence is Acceptable"
    description: "Output's predicted success rate is above tier minimum"
    type: "CONFIDENCE_THRESHOLD"
    blocking: false
    # Non-blocking: confidence is probabilistic, not deterministic

    confidence_minimums:
      T1:
        minimum_confidence: 0.75
        message: "T1 requires 75%+ success confidence. Current: {confidence}%"

      T2:
        minimum_confidence: 0.60
        message: "T2 requires 60%+ success confidence. Current: {confidence}%"

      T3:
        minimum_confidence: 0.50
        message: "T3 requires 50%+ success confidence. Current: {confidence}%"

      T4:
        minimum_confidence: 0.40
        message: "T4 requires 40%+ success confidence. Current: {confidence}%"

    implementation:
      check: "confidence >= tier_minimum"
      on_fail: "WARN (non-blocking), identify confidence issues"
      on_pass: "Gate passes"

  # Gate Summary: Which Gates Block vs. Warn
  gate_blocking_summary:
    blocking_gates:
      - "Gate 1: Quality Score Minimum (blocks deployment if score too low)"
      - "Gate 2: Critical Issues (blocks if any critical gaps)"
      - "Gate 3: Guardrail Compliance (blocks if guardrails fail)"

    warning_gates:
      - "Gate 4: Quality Trend (warns if declining, doesn't block)"
      - "Gate 5: Confidence Prediction (warns if low, doesn't block)"

    decision_logic: "All 3 blocking gates must PASS. Warning gates only inform user."

---

## CI/CD Integration Points

### Deployment Pipeline Hook

When user attempts to deploy output:

```
1. Trigger quality review
2. Run all 5 gates
3. Evaluate results:

   IF Gate 1 PASS AND Gate 2 PASS AND Gate 3 PASS:
     → Deployment APPROVED
     → (Run Gate 4 & 5 for warnings)
     → Proceed to deployment

   ELSE:
     → Deployment BLOCKED
     → Show which gates failed
     → Offer: (a) Fix and retry, (b) Override + reason, (c) Downgrade tier
```

### Notifications

**On PASS:**
```
✅ Quality gates passed. Output is approved for deployment.
   Quality score: 78/100 (T2 standard ✓)
   Guardrails: All active guardrails pass ✓
   Confidence: 72% success probability
   Ready to deploy.
```

**On FAIL:**
```
❌ Quality gates FAILED. Deployment blocked.

   Gate 1: Quality Score ✅ PASS (78/100 >= 75 required)
   Gate 2: Critical Issues ❌ FAIL (1 critical gap found: missing competitor context)
   Gate 3: Guardrails ✅ PASS (all active guardrails pass)

   Action needed: Address critical gap in competitive context.
   Options: (a) Add competitor analysis, (b) Escalate for exception, (c) Downgrade to T3
```

